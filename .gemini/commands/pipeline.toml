description = "Run the full 6-agent Indian Rent Control Drafting pipeline (reader → format → drafter → verifier → refiner → overseer) on a case folder."

prompt = """
# Full Pipeline — Indian Rent Control Drafting (Gemini CLI)

Run the complete 6-agent drafting pipeline on a case folder. Sequential execution: each stage's output is the next stage's input.

## User-supplied case folder

```
{{args}}
```

If empty, ask: "Which case folder? (provide path)"

## Pipeline

| Stage | Agent | Input | Output |
|-------|-------|-------|--------|
| 1 | Reader | case folder + laws/ subfolder | case-facts.md |
| 2 | Format | case-facts.md + bench-config / case-config | format-shell.md |
| 3 | Drafter | case-facts.md + format-shell.md | draft-v1.docx |
| 4 | Verifier | draft-v1.docx + case-facts.md | verification-report.md |
| 5 | Refiner | draft-v1.docx + verification-report.md | draft-v2.docx |
| 6 | Overseer | draft-v2.docx (opposing-counsel lens) | opposing-notes.md + final-draft.docx |

## Execution

Run each stage by invoking the matching slash command in sequence. For each:
1. State which stage you are entering ("Stage 1/6 — Reader")
2. Invoke the agent (or inline the canonical spec from `agents/<name>/<name>.md`)
3. Wait for completion, verify output file exists
4. Hand off to next stage

**STOP conditions** (any stage):
- Reader: missing required law PDF → STOP, ask user to supply
- Format: bench-config / case-config missing or incomplete → STOP, ask
- Verifier: hallucinated dates / fabricated citations / orphan annexure markers detected → STOP, do NOT proceed to Refiner until Drafter re-runs with corrections
- Overseer: attackable defect in prayer / contradictory facts / missing limb of argument → flag for user review before final-draft.docx ships

## Forum / jurisdiction context

**Court:** Rent Controller / Court of Small Causes / Rent Authority / Rent Tribunal / Prescribed Authority / Civil Judge as Rent Controller (per state)
**Conventions:** State Rent Control Act-aware. Reads `<case-folder>/case-config.md` for: applicable State Rent Control Act + forum nomenclature + court-fee framework + Section 106 TPA notice discipline (or V. Dhanapal Chettiar State-Act displacement) + rent-deposit / standard-rent fixation framework.
**Case types supported:** Eviction (bona-fide need · sub-letting · arrears · damaging premises) · Standard-rent fixation · Rent-deposit · Section 14(1)(e) DRC Act summary procedure · Statutory tenancy heritability (Damadilal · Gian Devi Anand) · Pagdi (Section 56 MRC Act)

## Privacy posture

This pipeline runs on Gemini cloud. **Mandatory before running on real client matters:**
- Gemini PAID tier (free tier sends prompts to training — BCI Rule 17 breach)
- OR run on local Ollama via the parent `ailawfirm-india` CLI (config switch)

For templates / study / non-client work: Gemini paid OR free is fine.

## Output discipline (every stage)

- AI-drafted. Verify before filing.
- Advocate retains full professional responsibility under Advocates Act 1961.
- Every citation: verify on SCC OnLine / Manupatra / IndianKanoon before inclusion.
- Every statutory section: verify pre/post 1 July 2024 (BNS / BNSS / BSA transition).
"""
